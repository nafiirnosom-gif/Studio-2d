<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>R2D Studio — 2D Game Engine</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
:root {
  --bg0:#09090f; --bg1:#0f0f18; --bg2:#14141f; --bg3:#1a1a28;
  --bg4:#202030; --bg5:#282840;
  --border:#222235; --border2:#2e2e48;
  --t1:#e8e8f8; --t2:#9090b8; --t3:#555578;
  --acc:#00e5ff; --acc2:#7c3aed; --acc3:#10b981;
  --red:#ff4444; --yellow:#ffb800; --orange:#ff6b35;
  --sel:#0a2855; --sel2:#0d1f3c;
  --font:'Outfit',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:5px; --r2:8px; --r3:12px;
  --sh:0 8px 32px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg0);}
body{font-family:var(--font);color:var(--t1);font-size:12px;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── MENU BAR ── */
#mbar{height:28px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:1px;flex-shrink:0;z-index:200;}
.logo{font-size:13px;font-weight:800;letter-spacing:-0.5px;padding:0 12px 0 2px;margin-right:4px;border-right:1px solid var(--border2);}
.logo span{color:var(--acc);}
.mi{padding:2px 10px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:11px;transition:.1s;position:relative;}
.mi:hover,.mi.open{background:var(--bg4);color:var(--t1);}
.dd{position:absolute;top:calc(100% + 2px);left:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:4px 0;min-width:190px;z-index:500;box-shadow:var(--sh);display:none;}
.dd.show{display:block;animation:ddIn .12s ease;}
@keyframes ddIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ddi{padding:6px 14px;cursor:pointer;color:var(--t1);display:flex;align-items:center;gap:9px;font-size:11px;transition:.1s;}
.ddi:hover{background:var(--bg5);}
.ddi .ic{width:16px;text-align:center;}
.ddi .sh{margin-left:auto;color:var(--t3);font-size:10px;font-family:var(--mono);}
.dds{height:1px;background:var(--border);margin:3px 0;}

/* ── TOOLBAR ── */
#tbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:3px;flex-shrink:0;}
.tg{display:flex;align-items:center;gap:2px;padding:0 8px;border-right:1px solid var(--border);}
.tg:last-child{border:none;margin-left:auto;}
.tb{height:32px;padding:0 11px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--font);color:var(--t2);background:transparent;border:1px solid transparent;transition:.15s;white-space:nowrap;}
.tb:hover{background:var(--bg4);color:var(--t1);border-color:var(--border);}
.tb.act{background:var(--sel);color:var(--acc);border-color:var(--acc)44;}
.tb.play{background:linear-gradient(135deg,#065f46,#047857);color:#6ee7b7;border-color:#059669;}
.tb.play:hover{background:linear-gradient(135deg,#047857,#065f46);}
.tb.play.stop{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fca5a5;border-color:#ef4444;}
.tb.pub{background:linear-gradient(135deg,var(--acc2),#5b21b6);color:#c4b5fd;border-color:#7c3aed;}
.tb.save-r2d{background:linear-gradient(135deg,#164e63,#0c4a6e);color:#38bdf8;border-color:#0ea5e9;}

/* ── MAIN LAYOUT ── */
#ws{flex:1;display:flex;overflow:hidden;}

/* ── PANELS ── */
#pl{width:230px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#pr{width:250px;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.ph{height:28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;flex-shrink:0;}
.ph .phi{font-size:13px;}
.ph .pha{margin-left:auto;display:flex;gap:3px;}
.phb{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:12px;transition:.12s;border:none;background:transparent;}
.phb:hover{background:var(--bg5);color:var(--t1);}

/* ── EXPLORER ── */
#exps{padding:5px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
#exps input{width:100%;height:22px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--t1);font-size:11px;padding:0 8px;outline:none;font-family:var(--font);}
#exps input:focus{border-color:var(--acc)55;}
#exps input::placeholder{color:var(--t3);}
#tree{flex:1;overflow-y:auto;padding:3px 0;}
.tr{position:relative;}
.trr{display:flex;align-items:center;height:24px;padding-right:4px;cursor:pointer;border-radius:var(--r);margin:0 4px;transition:.1s;gap:0;}
.trr:hover{background:var(--bg3);}
.trr.sel{background:var(--sel);}
.trr.sel .trl{color:var(--acc);}
.trt{width:16px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--t3);}
.tri{font-size:13px;width:18px;flex-shrink:0;text-align:center;}
.trl{flex:1;font-size:11px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tradd{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t3);cursor:pointer;opacity:0;transition:.12s;flex-shrink:0;}
.trr:hover .tradd{opacity:1;}
.tradd:hover{background:var(--bg5);color:var(--acc);}
.trc.col{display:none;}

/* ── VIEWPORT ── */
#vwrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#ctbar{height:26px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0;}
.ctb{padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;color:var(--t2);background:transparent;border:1px solid transparent;transition:.12s;display:flex;align-items:center;gap:3px;}
.ctb:hover{background:var(--bg4);color:var(--t1);border-color:var(--border);}
.ctb.act{background:var(--sel2);color:var(--acc);border-color:var(--acc)44;}
#cm{flex:1;position:relative;overflow:hidden;}
#cv{display:block;width:100%;height:100%;touch-action:none;}
#cov{position:absolute;inset:0;pointer-events:none;padding:8px;display:flex;flex-direction:column;justify-content:space-between;}
.coi{background:rgba(0,0,0,.55);border:1px solid var(--border);border-radius:var(--r);padding:3px 8px;font-size:10px;color:var(--t2);font-family:var(--mono);width:fit-content;backdrop-filter:blur(4px);}
.com{background:rgba(0,229,255,.08);border:1px solid var(--acc)44;border-radius:var(--r);padding:3px 10px;font-size:10px;color:var(--acc);font-weight:700;width:fit-content;letter-spacing:.5px;}
.com.play{background:rgba(16,185,129,.08);border-color:var(--acc3)44;color:var(--acc3);}
#gui-ov{position:absolute;inset:0;pointer-events:none;z-index:5;}
#gui-ov.live{pointer-events:all;}

/* ── PROPERTIES ── */
#propw{flex:1;overflow-y:auto;}
.ps{margin-bottom:1px;}
.psh{height:24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;cursor:pointer;color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:4px;user-select:none;transition:.1s;}
.psh:hover{color:var(--t2);}
.psh .pt{font-size:7px;transition:transform .2s;}
.psh.col .pt{transform:rotate(-90deg);}
.psb{padding:2px 0;}
.psb.col{display:none;}
.pr2{display:flex;align-items:center;height:26px;padding:0 8px 0 10px;gap:5px;transition:.1s;}
.pr2:hover{background:var(--bg3);}
.pk{width:88px;flex-shrink:0;font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pv{flex:1;min-width:0;}
.pi{width:100%;height:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;color:var(--t1);font-size:11px;padding:0 6px;outline:none;font-family:var(--font);transition:.15s;}
.pi:focus{border-color:var(--acc)55;background:var(--bg4);}
.pi[type=number]{-moz-appearance:textfield;}
.pi[type=number]::-webkit-inner-spin-button{display:none;}
.pcol{height:20px;border:1px solid var(--border2);border-radius:3px;overflow:hidden;cursor:pointer;}
.pcol input{width:100%;height:100%;border:none;cursor:pointer;background:transparent;}
.pchk{display:flex;align-items:center;gap:6px;}
.pchk input{accent-color:var(--acc);width:13px;height:13px;cursor:pointer;}
.pvec{display:flex;gap:3px;}
.pvec input{width:0;flex:1;}
.psel{width:100%;height:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;color:var(--t1);font-size:11px;padding:0 4px;outline:none;cursor:pointer;}
.pempty{padding:16px;text-align:center;color:var(--t3);font-size:11px;}

/* ── BOTTOM ── */
#pb{height:200px;background:var(--bg1);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#btabs{height:28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 6px;gap:1px;flex-shrink:0;}
.bta{height:24px;padding:0 12px;border-radius:var(--r) var(--r) 0 0;cursor:pointer;font-size:11px;color:var(--t2);display:flex;align-items:center;gap:5px;transition:.12s;border:1px solid transparent;border-bottom:none;}
.bta:hover{color:var(--t1);background:var(--bg3);}
.bta.act{color:var(--t1);background:var(--bg1);border-color:var(--border);}
.btp{display:none;flex:1;overflow:hidden;flex-direction:column;}
.btp.act{display:flex;}
#olog{flex:1;overflow-y:auto;padding:6px 8px;font-family:var(--mono);font-size:11px;color:var(--t2);}
.ll{padding:1px 0;display:flex;gap:8px;}
.ll.e .lm{color:var(--red);}
.ll.w .lm{color:var(--yellow);}
.ll.i .lm{color:var(--acc);}
.ll.s .lm{color:var(--acc3);}
.lt{color:var(--t3);flex-shrink:0;}
#scped{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#scpeh{height:28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;}
#scpta{flex:1;background:var(--bg0);border:none;outline:none;color:var(--t1);font-family:var(--mono);font-size:12px;padding:10px 14px;resize:none;line-height:1.7;tab-size:2;}

/* ── STATUS ── */
#sbar{height:20px;background:var(--bg0);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:16px;font-size:10px;color:var(--t3);font-family:var(--mono);flex-shrink:0;}
.si{display:flex;align-items:center;gap:4px;}
.sd{width:5px;height:5px;border-radius:50%;background:var(--acc3);}
.sd.warn{background:var(--yellow);}

/* ── MODAL OVERLAY ── */
#mov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:600;backdrop-filter:blur(6px);}
#mov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column;animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95)translateY(-8px)}to{opacity:1;transform:scale(1)translateY(0)}}
.mh{height:40px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.mt{font-size:13px;font-weight:700;color:var(--t1);}
.mc{margin-left:auto;width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:16px;transition:.12s;border:none;background:transparent;}
.mc:hover{background:var(--red);color:#fff;}
.mb2{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.mf{height:44px;background:var(--bg1);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding:0 14px;gap:6px;flex-shrink:0;}

/* Insert Object Modal */
#ins-modal{width:500px;height:540px;}
#ins-cats{width:130px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg1);}
.ic2{padding:7px 12px;cursor:pointer;font-size:11px;color:var(--t2);transition:.1s;border-left:2px solid transparent;}
.ic2:hover{background:var(--bg3);color:var(--t1);}
.ic2.act{background:var(--bg3);color:var(--acc);border-left-color:var(--acc);}
#ins-items{flex:1;overflow-y:auto;padding:6px;display:grid;grid-template-columns:1fr 1fr;gap:4px;align-content:start;}
.ii{padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border);background:var(--bg3);transition:.12s;display:flex;align-items:center;gap:8px;}
.ii:hover{background:var(--bg5);border-color:var(--acc)44;}
.ii.sel{background:var(--sel);border-color:var(--acc);}
.iic{font-size:18px;width:22px;text-align:center;flex-shrink:0;}
.iin{font-size:11px;color:var(--t1);font-weight:600;}
.iid{font-size:9px;color:var(--t3);}

/* Publish Modal */
#pub-modal{width:520px;height:auto;}
.pub-sec{padding:14px 16px;border-bottom:1px solid var(--border);}
.pub-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.pub-input{width:100%;height:32px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--t1);font-size:12px;padding:0 10px;outline:none;font-family:var(--font);}
.pub-input:focus{border-color:var(--acc)55;}
.pub-row{display:flex;gap:8px;margin-top:6px;}
.pub-stat{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center;}
.pub-stat .psn{font-size:18px;font-weight:800;color:var(--acc);}
.pub-stat .psl{font-size:10px;color:var(--t3);}
.game-link{background:var(--bg0);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-family:var(--mono);font-size:11px;color:var(--acc);display:flex;align-items:center;gap:8px;margin-top:6px;}
.game-link button{margin-left:auto;padding:3px 8px;border-radius:3px;border:1px solid var(--acc)44;background:transparent;color:var(--acc);cursor:pointer;font-size:10px;transition:.12s;}
.game-link button:hover{background:var(--acc)22;}

/* Save modal */
#save-modal{width:420px;}
.save-step{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);}
.ss-num{width:24px;height:24px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);flex-shrink:0;}
.ss-num.done{background:var(--acc3)22;border-color:var(--acc3)66;color:var(--acc3);}
.ss-num.act{background:var(--acc)22;border-color:var(--acc)66;color:var(--acc);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.ss-info{flex:1;}
.ss-label{font-size:12px;color:var(--t1);font-weight:600;}
.ss-desc{font-size:10px;color:var(--t3);}
.ss-check{font-size:16px;color:var(--acc3);}

/* R2D Upload zone */
#upload-zone{width:100%;padding:30px;border:2px dashed var(--border2);border-radius:var(--r3);text-align:center;cursor:pointer;transition:.2s;background:var(--bg3);}
#upload-zone:hover,#upload-zone.drag{border-color:var(--acc);background:var(--acc)08;}
#upload-zone p{color:var(--t2);margin-top:8px;font-size:12px;}
#upload-zone .uz-icon{font-size:40px;}

/* CTX */
#ctx{position:fixed;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:4px 0;min-width:170px;z-index:1000;box-shadow:var(--sh);display:none;animation:ctxI .1s ease;}
@keyframes ctxI{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ci{padding:5px 14px;cursor:pointer;font-size:11px;color:var(--t1);display:flex;align-items:center;gap:8px;transition:.1s;}
.ci:hover{background:var(--bg5);}
.ci.danger{color:var(--red);}
.csep{height:1px;background:var(--border);margin:3px 0;}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%)translateY(16px);background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r2);padding:7px 16px;font-size:12px;color:var(--t1);z-index:2000;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--sh);white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%)translateY(0);}

/* Buttons */
.btn{height:28px;padding:0 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg4);color:var(--t1);font-size:11px;cursor:pointer;transition:.12s;font-family:var(--font);display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:var(--bg5);}
.btn.pri{background:var(--acc)22;border-color:var(--acc)66;color:var(--acc);}
.btn.pri:hover{background:var(--acc)33;}
.btn.suc{background:var(--acc3)22;border-color:var(--acc3)66;color:var(--acc3);}
.btn.dan{background:var(--red)22;border-color:var(--red)66;color:var(--red);}

/* ═══ SCRIPT EDITOR WINDOW ═══ */
#script-win{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:760px;height:530px;background:#0a0a12;border:1px solid #2a2a44;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.85);z-index:1500;display:none;flex-direction:column;overflow:hidden;min-width:380px;min-height:280px;}
#script-win.open{display:flex;animation:swIn .16s ease;}
@keyframes swIn{from{opacity:0;transform:translate(-50%,-50%) scale(.94)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#sw-titlebar{height:38px;background:#101018;border-bottom:1px solid #1e1e30;display:flex;align-items:center;padding:0 10px;gap:7px;flex-shrink:0;cursor:grab;user-select:none;}
#sw-titlebar:active{cursor:grabbing;}
.sw-dot{width:12px;height:12px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:.1s;}
.sw-dot.r{background:#ff5f57;}.sw-dot.r:hover{background:#ff3b30;}
.sw-dot.y{background:#febc2e;}.sw-dot.y:hover{background:#ffb300;}
.sw-dot.g{background:#28c840;}.sw-dot.g:hover{background:#1db034;}
#sw-ttl{font-size:12px;color:#8090b8;flex:1;margin-left:4px;font-family:'Outfit',sans-serif;}
#sw-badge{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700;border:1px solid currentColor;}
#sw-tabs{height:30px;background:#0e0e1a;border-bottom:1px solid #1a1a2c;display:flex;align-items:flex-end;padding:0 8px;gap:1px;flex-shrink:0;overflow-x:auto;}
.sw-tab{height:26px;padding:0 10px;border-radius:4px 4px 0 0;cursor:pointer;font-size:11px;color:#506080;display:flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid transparent;border-bottom:none;transition:.1s;font-family:'Outfit',sans-serif;}
.sw-tab:hover{color:#8090b8;}
.sw-tab.act{color:#e8e8f8;background:#0a0a12;border-color:#2a2a44;}
.sw-tab-x{font-size:13px;color:#506080;border-radius:2px;padding:0 2px;transition:.1s;}
.sw-tab-x:hover{background:rgba(255,68,68,.3);color:#ff6060;}
#sw-body{flex:1;display:flex;overflow:hidden;position:relative;}
#sw-gutter{width:46px;flex-shrink:0;background:#07070f;border-right:1px solid #1a1a2c;overflow:hidden;}
#sw-lines{padding:10px 8px 10px 0;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;text-align:right;color:#304060;overflow:hidden;white-space:nowrap;}
#sw-lines div{min-height:21.45px;}
#sw-ed{flex:1;position:relative;overflow:hidden;}
